      schema:
        default: json
        enum:
        - json
        - jsonextended
        - csv
        type: string
      style: form
    PatternParam:
      description: |
        Optional pattern type to use for matching:
        - `exact` for exact match
        - `contains` for the string to be contained in the query
        - `regex` to match based on a regular expression
      explode: true
      in: query
      name: pattern
      required: false
      schema:
        default: exact
        enum:
        - exact
        - contains
        - regex
        type: string
      style: form
  responses:
    NotUniqueError:
      content:
        application/json:
          schema:
