openapi: 3.0.0
info:
  contact:
    email: support@oden.io
    name: Oden Support
    url: https://oden.io/contact/
  description: "The Oden Private Partner API exposes RESTful API endpoints for clients\
    \ to get, create and update data on the Oden Platform.\n\nThe API is based on\
    \ the OpenAPI 3.0 specification.\n### Current Version\nThe URL, and host, for\
    \ the current version is [https://api.oden.app/v2](https://api.oden.app/v2).\n\
    \n### Oden's Data Model\n- **Organization**: This represents the Organization\
    \ registered as an Oden customer. An organization has an associated collection\
    \ of users, factories, lines, etc. This is the entity a specific authentication\
    \ token is associated with.\n- **Asset** or **Machinegroup**: Assets, or machinegroups,\
    \ are collections of machines, which may either be a **Factory** or a **Line**:\n\
    \  - **Factory**: Factories are collections of lines, representing a particular\
    \ manufacturing location.\n    - **Line**: Lines are collections of machines,\
    \ often representing a particular production line. Lines may also have **Products**\
    \ mapped to them, indicating what is currently being manufactured by the specific\
    \ line.\n      - **Machine**: Machines are the physical machines that make up\
    \ a line\n- **Product**: Products capture what entities a manufacturer produces\n\
    - **Interval**: An interval is a period of time that takes place on a manufacturing\
    \ line and expresses some business concern. It's Oden's way of making metrics\
    \ aggregatable, traceable, and relatable to a manufacturer.\n  - **Run**: A run\
    \ is a production interval that labels a period of production as being work on\
    \ some single product\n  - **Batch**: A batch is a production interval that represents\
    \ a portion of a particular run\n  - **State**: A state is an interval that tracks\
    \ the availability or utilization of a line\n    - **State Category**: A state\
    \ category describes what state a line is in - such as ex. uptime, downtime, scrapping,\
    \ etc.\n    - **State Reason**: A state reason describes why a line is in a particular\
    \ state - such as \"maintenance\" being a reason for the category \"downtime\"\
    .\n  - **Custom**: A custom interval can track any other type of interval-based\
    \ data a manufacturer might want to analyze. These are created on a per-factory\
    \ basis.\n- **Target**: Targets specify values and upper/lower thresholds for\
    \ metrics when specific products are running on specific lines\n- **Scrap/Yield**:\
    \ Scrap/yield output specifies amount of produced product on a line during either\
    \ a run or batch interval. Oden will categorize all output as either scrap or\
    \ yield - as specified by the Scrap Yield Schema for a given factory. If you have\
    \ other categories, like rework/blocked/off-grade, you must choose between categorizing\
    \ those amounts as either good or bad production by specifying as scrap or yield.\
    \ Clients may also add scrap codes (i.e., reasons) to a given Scrap Yield Data\
    \ entry.\n  - **Scrap Code**: A scrap code is a code that explains the reason\
    \ for a scrap/yield raw data input - such as \"Rework\"\n- **Quality Test**: Quality\
    \ Tests are results of quality assurance tests done on site, and uploaded to Oden.\
    \ They may be attached to a single Batch or Run.\n- **Metric**: Known in factories\
    \ as \"tags\", metrics are the raw data that is collected by Oden from the machines\
    \ and devices on the factory floor.\n- **Metric Group**: Metric groups are metrics\
    \ that represent the same thing across different lines. They provide common display\
    \ names for tags and allow labeling groups of tags as measuring key types of data\
    \ like performance or production.\n- **Maintenance Work Order**: A maintenance\
    \ work order can be used to track work orders maintained in MaintainX and associate\
    \ them with an Oden line. \n\n### Best Practices\nUnder the current implementation,\
    \ the Oden API does not rate limit requests from clients.\n\nHowever, rate limiting\
    \ will be introduced in the near future and it is recommended that users design\
    \ their API\nclients to not exceed a request rate of **one per second**.\n\n###\
    \ Schema\nAll v2 API access is over HTTPS and accessed from https://api.oden.app/v2\n\
    All data is sent and received as JSON.\n\nAPI requests with duplicate keys will\
    \ process only the data for the first key detected and ignore the rest, so it's\
    \ not recommended. Batching multiple messages in this way is currently not possible.\n\
    \  - Example of duplicate key in JSON: {\"raw_data\":{\"scrap\":\"10\",\"scrap\"\
    :\"100\"}}\n\nAll timestamps are returned in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601#Times)\
    \ format:\n\n  `YYYY-MM-DDTHH:MM:SSZ`\n\nAll durations are returned in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601#Times)\
    \ format with the largest unit of time being the hour:\n\n   `PT[n]H[n]M[n]S`\n\
    \nAll timestamps sent to the API in POST requests should be in ISO 8601 format.\n\
    ### HTTP Verbs\nThe ONLY HTTP call type (sometimes called *verb* or *method*)\
    \ used within Oden's API is **POST**.\nThere are three actions supported via a\
    \ **POST**; call, search, set, and delete, together supporting CRUD operations;\n\
    \  - **search** requests are used to search for and *read* objects in the Oden\
    \ Platform\n      - All Oden Objects may be uniquely identified by some combination\
    \ of, or a single, parameter.\n        - Ex a `line` my be identified by either:\n\
    \          - `id`\n          - `name` AND `factory`\n  - **set** requests are\
    \ used to *create* or *update* objects\n  - **delete** requests are used to *delete*\
    \ objects. If a delete endpoint is not yet implemented for a given object, users\
    \ may choose to update the values of a specific entity to null or 0 values.\n\n\
    ### URI Components\nAll endpoints may be accessed with the URI pattern:\n`https://api.oden.app/v2/{object}/{action}`\n\
    \nWhere:\n  - `object` is the name of the object being requested:\n       - `factory`,\
    \ `quality_test`, `interval`, `line`, etc...\n  - `action` is the name of the\
    \ action being requested\n    - `search` , `set` , `delete`\n\ne.g. `https://api.oden.app/v2/factory/search`\n\
    \n# Authentication\nClients can authenticate through the v2 API using a Token\
    \ provided by Oden. Tokens are opaque strings similar to\n[Bearer](https://swagger.io/docs/specification/authentication/bearer-authentication/)\
    \ tokens that the client must\npass in the [HTTP Authorization request header](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Authorization)\
    \ in every request.\nThe syntax is as follows:\n\n`Authorization: <type> <credentials>`\n\
    \nWhere \\<type\\> is \"Token\" and \\<credentials\\> is the Token string. For\
    \ example:\n\n`Authorization: Token tokenStringProvidedByOden`\n\nAuthenticating\
    \ with an invalid Token will return `401 Unauthorized Error`.\n\nAuthenticating\
    \ with a Token that is not authorized to read requested data will return `403\
    \ Forbidden Error`.\n\nSome endpoints may require requests to be broken out by\
    \ machinegroup (i.e., line or factory) and the number of\nrequests would scale\
    \ accordingly. This multiplicity should be taken into consideration when deciding\
    \ on the\nfrequency the API client makes requests to the Oden endpoints.\n\nTo\
    \ authenticate in this [UI](https://api.oden.app/v2/ui/), click the Lock icon,\
    \ and copy/paste the token into the Authorize box.\n"
  title: Oden API
  version: 2.0.0
servers:
- description: Oden API server
  url: https://api.oden.app
security:
- APIKeyAuth: []
paths:
  /v2/line/search:
    post:
      description: |
        Search for specific Line by any Line identifier. Either:
        - `id`
        - `match: unique` or omit

        OR
        - `factory`
          - `name` or `id`
        - line `name`
        - `match: unique` or omit

        Search for all Lines for a given Factory:
        - `factory`
          - `name` or `id`
        - `match: all`
      operationId: search_lines
      requestBody:
        content:
          application/json:
            examples:
              Search for all lines of a factory:
                summary: Search for all lines of a factory
                value:
                  match: all
                  factory:
                    name: Factory A
              Search for line by name at a factory:
                summary: Search for line by name at a specific factory
                value:
                  match: unique
                  name: Line 01
                  factory:
                    name: Factory A
              Search for line by secondary name:
                summary: Search for line by secondary name
                value:
                  match: unique
                  secondary_name: Line 01 Secondary
                  factory:
                    name: Factory A
            schema:
              $ref: "#/components/schemas/Line"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Line"
                type: array
          description: A list of lines.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: |
            User has provided valid credentials but is not authorized to access the entity
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Entity not found
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
      summary: Search production lines
      tags:
      - Machine Groups
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/factory/search:
    post:
      description: |
        Search for a specific Factory by a unique indentifier:
        - `name`
        - `match: unique` or omit

        OR

        - `id`
        - `match: unique` or omit

        Search for all factories:
        - `match: all`
      operationId: search_factories
      requestBody:
        content:
          application/json:
            examples:
              Search factory by name:
                summary: Search for factory by name
                value:
                  name: Factory A
              Search factory by secondary name:
                summary: Search for factory by secondary name
                value:
                  secondary_name: Factory A Secondary
                  match: unique
              Search for all factories:
                summary: Search for all factories
                value:
                  match: all
            schema:
              $ref: "#/components/schemas/Factory"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Factory"
                type: array
          description: A list of factories.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: |
            User has provided valid credentials but is not authorized to access the entity
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Entity not found
      summary: Search factories
      tags:
      - Machine Groups
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/metric_group/search:
    post:
      description: |
        Search for a specific Metric Group:

        - `name`
        - `match: unique` or omit

        OR

        - `id`
        - `match: unique` or omit

        Search for all Metric Groups:
        - `match: all`
      operationId: search_metric_groups
      requestBody:
        content:
          application/json:
            examples:
              Search for all metric groups:
                summary: Search for all metric groups
                value:
                  match: all
            schema:
              $ref: "#/components/schemas/MetricGroup"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/MetricGroup"
                type: array
          description: A list of metric groups.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: |
            User has provided valid credentials but is not authorized to access the entity
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Entity not found
      summary: Search metric groups
      tags:
      - Metric Groups
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product/search:
    post:
      description: |
        Search for specific Product:
        - `name`
        - `match: unique` or omit

        OR

        - `id`
        - `match: unique` or omit

        May be used to confirm a Product exists or to get a Product `id` if `name` is known, or `name` if `id` is known.
      operationId: search_products
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Product"
                type: array
          description: A list of products.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: |
            User has provided valid credentials but is not authorized to access the entity
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
      summary: Search products
      tags:
      - Products
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product/set:
    post:
      description: |
        To **create** a new Product, include `name`, and omit `id` field.

        To **update** an existing Product, include the `id` of the existing product the updated `name`.
      operationId: set_product
      requestBody:
        content:
          application/json:
            examples:
              create:
                summary: Create a product.
                value:
                  name: product name
              update:
                summary: Update existing product by providing the product ID.
                value:
                  name: updated product name
                  id: 0012ab4d-1234-123a-8c76-6ea2344be6df
            schema:
              $ref: "#/components/schemas/Product"
        required: true
      responses:
        "200":
          description: Successful response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
      summary: Create or update a product
      tags:
      - Products
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product/delete:
    post:
      description: |
        Delete a Product by unique identifier:
        - `name`
        - `match: unique` or omit

        OR

        - `id`
        - `match: unique` or omit

        A deleted Product will not show up in Product searches or dropdowns, but associated Intervals will still exist.
      operationId: delete_product
      requestBody:
        content:
          application/json:
            examples:
              delete by product id:
                summary: Delete product by product id.
                value:
                  id: 0012ab4d-1234-123a-8c76-6ea2344be6df
              delete by product name:
                summary: Delete product by product name.
                value:
                  name: EX0PRODNAME
            schema:
              $ref: "#/components/schemas/Product"
        required: true
      responses:
        "200":
          description: Successful response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Entity not found
      summary: Delete a product
      tags:
      - Products
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product_mapping/search:
    post:
      description: |
        Searches for Product Mappings.

        May be used to confirm a Product Mapping exists.

        Much like `product/search`, may be used to get `name`s of line or product from `id`s,
        or `id`s from `name`s.
      operationId: search_product_mappings
      requestBody:
        content:
          application/json:
            examples:
              match by product ID and line ID:
                summary: Match product mapping with given product and line ID.
                value:
                  line:
                    id: 2fc8b5e5-fb88-48a7-9c35-4a763206608c
                  product:
                    id: b5da7b1f-3c16-5084-a5da-95b2eba5a4db
              match by product name and line name+factory:
                summary: Match product mapping with given product and line name  -
                  alternative example.
                value:
                  line:
                    name: Line 01
                    factory:
                      id: e32d004e-ce8b-40bf-bbc1-14fd907d2f47
                  product:
                    name: 2AFBCA5E
              match all by line:
                summary: Match all product mappings for a given line
                value:
                  line:
                    id: 2fc8b5e5-fb88-48a7-9c35-4a763206608c
                  match: all
            schema:
              $ref: "#/components/schemas/ProductMapping"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProductMapping"
                type: array
          description: A list of product mappings.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
      summary: Search product-to-line mappings
      tags:
      - Product Mappings
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product_mapping/set:
    post:
      description: |
        Map a Product to a Line - implying this Line can produce, or is producing this Product.

        If the supplied Product doesn't exist, it will be created.
      operationId: set_product_mapping
      requestBody:
        content:
          application/json:
            examples:
              set by product ID and line ID:
                summary: Set product mapping with given product and line ID.
                value:
                  line:
                    id: 2fc8b5e5-fb88-48a7-9c35-4a763206608c
                  product:
                    id: b5da7b1f-3c16-5084-a5da-95b2eba5a4db
              set by product name and line name+factory:
                summary: Set product mapping with given product and line name  - alternative
                  example.
                value:
                  line:
                    name: Line 01
                    factory:
                      id: e32d004e-ce8b-40bf-bbc1-14fd907d2f47
                  product:
                    name: 2AFBCA5E
            schema:
              $ref: "#/components/schemas/ProductMapping"
        required: true
      responses:
        "200":
          description: Successful response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_409_response"
          description: |
            A {match: "unique"} was requested, but multiple entities matched the search parameters.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: User has provided either no credentials or invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_500_response"
          description: |
            An internal server error has occurred. If reporting the error to Oden, include the ID returned in this response to aid in debugging.
        "501":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Endpoint is not yet implemented
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/search_lines_400_response"
          description: An error occurred regarding one of the input parameters
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: Entity not found
      summary: Map a product to a line
      tags:
      - Product Mappings
      x-content-type: application/json
      x-accepts:
      - application/json
  /v2/product_attribute/search:
    post:
      description: |
        Searches for Product Attributes

        Product attributes may be searched by ID, product, or, display_name - in that order.

