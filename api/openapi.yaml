                  name: deletable_batch
                  line:
                    id: 2fc8b5e5-fb88-48a7-9c35-4a763206608c
                  start_time: 2021-04-04T08:00:04Z
            schema:
              $ref: "#/components/schemas/Interval"
        required: true
      responses:
