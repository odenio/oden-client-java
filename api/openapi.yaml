                value:
                  type:
                    name: STATE
                  line:
                    id: 2fc8b5e5-fb88-48a7-9c35-4a763206608c
                  start_time: 2021-04-04T08:00:04Z
                  end_time: 2021-04-10T08:00:04Z
                  match: all
